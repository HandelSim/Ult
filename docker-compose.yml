version: '3.9'

services:
  ato:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-tree-orchestrator
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_PATH=/app/data/ato.db
      - WORKSPACE_PATH=/workspace
      - PORT_API=3001
      - PORT_FRONTEND=3000
    volumes:
      # Persistent workspace for agent file outputs
      - ./workspace:/workspace
      # Persistent database storage
      - ato_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ato_data:
    driver: local
